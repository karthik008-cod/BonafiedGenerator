<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZPHS Kistapur — Login</title>
    <meta name="description" content="Staff login for ZPHS Kistapur Bonafide Certificate Generator." />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-box {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 32px 36px;
        width: 100%;
        max-width: 380px;
      }

      .header {
        text-align: center;
        margin-bottom: 24px;
        border-bottom: 1px solid #e5e5e5;
        padding-bottom: 20px;
      }

      .header h1 {
        font-size: 17px;
        font-weight: bold;
        color: #1a1a1a;
        margin-bottom: 3px;
      }

      .header p {
        font-size: 12px;
        color: #666;
      }

      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        font-size: 13px;
        color: #333;
        margin-bottom: 5px;
        font-weight: 500;
      }

      .field input {
        width: 100%;
        padding: 9px 11px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        color: #111;
        background: #fff;
        outline: none;
        transition: border-color 0.15s;
      }

      .field input:focus {
        border-color: #1a56db;
      }

      .btn-login {
        width: 100%;
        padding: 10px;
        background: #1a56db;
        border: none;
        border-radius: 5px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
        transition: background 0.15s;
      }

      .btn-login:hover { background: #1447b2; }
      .btn-login:active { background: #0f3b96; }
      .btn-login:disabled { background: #93b4f0; cursor: not-allowed; }

      .error-msg {
        display: none;
        background: #fff5f5;
        border: 1px solid #feb2b2;
        color: #c53030;
        font-size: 12.5px;
        padding: 9px 11px;
        border-radius: 5px;
        margin-bottom: 14px;
      }

      .error-msg.show { display: block; }

      .footer-note {
        text-align: center;
        font-size: 11.5px;
        color: #999;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>

    <div class="login-box">
      <div class="header">
        <h1>ZPHS Kistapur</h1>
        <p>Bonafide Certificate Generator — Staff Login</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter username"
            autocomplete="username"
            required
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

      <div class="footer-note">
        Mndl. Jannaram, Dist. Mancherial (T.S)
      </div>
    </div>

    <script>
      // If already logged in, go straight to app
      (function () {
        try {
          if (sessionStorage.getItem('__zphs_auth')) {
            window.location.replace('/app.html');
          }
        } catch (e) {}
      })();

      async function handleLogin(e) {
        e.preventDefault();
        const errEl = document.getElementById('errorMsg');
        const btn   = document.getElementById('loginBtn');
        const user  = document.getElementById('username').value.trim();
        const pass  = document.getElementById('password').value;

        errEl.className = 'error-msg';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
          });

          const data = await res.json();

          if (res.ok && data.success && data.token) {
            sessionStorage.setItem('__zphs_auth', data.token);
            window.location.replace('/app.html');
          } else {
            errEl.textContent = data.error || 'Invalid username or password.';
            errEl.className = 'error-msg show';
          }
        } catch (err) {
          errEl.textContent = 'Could not connect to server. Please try again.';
          errEl.className = 'error-msg show';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      }
    </script>
  </body>
</html>
